<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduQuiz Pro | Logic Trainer</title>
    <style>
        /* CSS3: Modern UI with Gradients and Glassmorphism */
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --success: #22c55e;
            --error: #ef4444;
            --dark: #0f172a;
        }

        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .quiz-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 500px;
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .progress-container {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            margin-bottom: 2rem;
            overflow: hidden;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transition: width 0.4s ease;
        }

        .stats { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 1rem; color: #94a3b8; }

        h2 { font-size: 1.5rem; margin-bottom: 1.5rem; line-height: 1.4; }

        .options-grid { display: grid; gap: 1rem; }

        .option-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            cursor: pointer;
            text-align: left;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        .option-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
            transform: translateX(5px);
        }

        .option-btn.correct { background: var(--success) !important; border-color: var(--success); }
        .option-btn.wrong { background: var(--error) !important; border-color: var(--error); }

        #feedback { text-align: center; margin-top: 1.5rem; font-weight: 600; min-height: 1.5rem; }

        .hidden { display: none; }

        .btn-main {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 1rem;
        }
    </style>
</head>
<body>

<div class="quiz-card">
    <div class="progress-container"><div id="progress-bar"></div></div>
    
    <div id="quiz-ui">
        <div class="stats">
            <span>Question <span id="q-num">1</span>/9</span>
            <span>Score: <span id="score">0</span></span>
        </div>
        <h2 id="question-text">Loading...</h2>
        <div id="options-container" class="options-grid"></div>
        <div id="feedback"></div>
    </div>

    <div id="result-screen" class="hidden" style="text-align: center;">
        <h1>Quiz Complete! 🎉</h1>
        <p style="font-size: 1.2rem; color: #94a3b8;">You scored <span id="final-score">0</span> out of 10</p>
        <button class="btn-main" onclick="location.reload()">Try Again</button>
    </div>
</div>

<script>
    /* 1. DATA STRUCTURE */
    const quizData = [
        { q: "Which keyword declares a constant in JS?", options: ["const", "let", "var", "static"], correct: "const" },
        { q: "What does HTML stand for?", options: ["Hyper Text Markup Language", "High Tech Modern Language", "Hyperlink Text Magic", "Home Tool Markup Language"], correct: "Hyper Text Markup Language" },
        { q: "Which structure is used for repeating tasks?", options: ["Iteration", "Selection", "Sequence", "Storage"], correct: "Iteration" },
        { q: "Which data type is for 3.14?", options: ["Float", "Integer", "Boolean", "String"], correct: "Float" },
        { q: "What is a 'Subprogram' used for?", options: ["Modularity & Reuse", "Making text bold", "Styling a page", "Increasing RAM"], correct: "Modularity & Reuse" },
        { q: "Which is a version control tool?", options: ["GitHub", "Sublime", "Chrome", "Python"], correct: "GitHub" },
        { q: "What is the purpose of CSS?", options: ["Styling and Layout", "Logic and Math", "Database storage", "Hardware control"], correct: "Styling and Layout" },
        { q: "What does 'UI' stand for?", options: ["User Interface", "Unit Input", "User Interaction", "Unique Identity"], correct: "User Interface" },
        { q: "What is a 'Commit' in Git?", options: ["Saving code changes", "Deleting a file", "Sending an email", "Writing a comment"], correct: "Saving code changes" }
    ];

    let currentIdx = 0;
    let score = 0;

    /* 2. COMPLEX LOGIC: Fisher-Yates Shuffle Algorithm */
    // This randomizes the options array so the answer moves around
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    /* 3. SUBPROGRAM: Load Question */
    function loadQuestion() {
        const data = quizData[currentIdx];
        document.getElementById('question-text').innerText = data.q;
        document.getElementById('q-num').innerText = currentIdx + 1;
        document.getElementById('progress-bar').style.width = ((currentIdx) / quizData.length) * 100 + "%";

        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = "";
        
        // Shuffle the options before displaying them!
        const shuffledOptions = shuffleArray([...data.options]);

        shuffledOptions.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = "option-btn";
            btn.innerText = opt;
            btn.onclick = () => handleAnswer(opt, btn);
            optionsContainer.appendChild(btn);
        });
    }

    /* 4. SUBPROGRAM: Handle Answer (Parameters & Selection) */
    function handleAnswer(choice, btn) {
        const correctAns = quizData[currentIdx].correct;
        const feedback = document.getElementById('feedback');
        
        // Disable all buttons immediately
        const allBtns = document.querySelectorAll('.option-btn');
        allBtns.forEach(b => b.disabled = true);

        if (choice === correctAns) {
            score++;
            btn.classList.add('correct');
            feedback.innerText = "Correct! ✨";
            feedback.style.color = "var(--success)";
        } else {
            btn.classList.add('wrong');
            feedback.innerText = "Incorrect!";
            feedback.style.color = "var(--error)";
        }

        document.getElementById('score').innerText = score;
        currentIdx++;

        setTimeout(() => {
            if (currentIdx < quizData.length) {
                feedback.innerText = "";
                loadQuestion();
            } else {
                showFinalResults();
            }
        }, 1200);
    }

    function showFinalResults() {
        document.getElementById('progress-bar').style.width = "100%";
        document.getElementById('quiz-ui').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('final-score').innerText = score;
    }

    loadQuestion();
</script>

</body>
</html>
