<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Software Engineering: Study Quiz Pro</title>
    <style>
        /* CSS3: Professional Educational Interface */
        :root {
            --primary: #3498db;
            --success: #27ae60;
            --error: #e74c3c;
            --bg: #f4f7f6;
            --text: #2c3e50;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg); 
            display: flex; 
            justify-content: center; 
            padding: 40px 20px;
            color: var(--text);
        }

        .quiz-container { 
            background: white; 
            width: 100%;
            max-width: 600px; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.1); 
        }

        .header-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .question-text { font-size: 1.3rem; margin-bottom: 20px; line-height: 1.4; }

        .option-btn { 
            display: block; 
            width: 100%; 
            padding: 15px; 
            margin: 12px 0; 
            background: #fff; 
            border: 2px solid #e0e0e0; 
            border-radius: 8px; 
            cursor: pointer; 
            text-align: left; 
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        .option-btn:hover { 
            border-color: var(--primary);
            background: #f0f7ff;
            transform: translateY(-2px);
        }

        .score-display { font-weight: bold; color: var(--primary); font-size: 1.1rem; }

        #feedback { 
            font-weight: bold; 
            margin-top: 20px; 
            text-align: center; 
            min-height: 24px;
        }

        .hidden { display: none; }

        .btn-restart {
            margin-top: 20px;
            padding: 12px 30px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div class="header-box">
        <h3 style="margin:0;">EduQuiz Generator</h3>
        <div class="score-display">Score: <span id="score">0</span></div>
    </div>

    <div id="quiz-ui">
        <div class="question-text" id="question-text">Initializing quiz engine...</div>
        <div id="options-container"></div>
        <div id="feedback"></div>
    </div>
    
    <div id="final-screen" class="hidden" style="text-align: center;">
        <h2>Quiz Complete! 🎓</h2>
        <p style="font-size: 1.2rem;">Your final score: <span id="final-score">0</span> / <span id="total-qs">0</span></p>
        <button class="btn-restart" onclick="location.reload()">Restart Session</button>
    </div>
</div>

<script>
    /* 1. DATA STRUCTURE: The Question Bank (Expanded) */
    // This fulfills the requirement for an organized data structure.
    const quizData = [
        { 
            q: "Which keyword is used to declare a constant variable in JavaScript?", 
            options: ["const", "var", "let", "fixed"], 
            correct: "const" 
        },
        { 
            q: "What does HTML stand for?", 
            options: ["Hyper Text Markup Language", "High Tech Modern Language", "Hyperlink Text Magic", "Home Tool Markup Language"], 
            correct: "Hyper Text Markup Language" 
        },
        { 
            q: "In programming, which control structure is used for repeating a task?", 
            options: ["Selection", "Sequence", "Iteration", "Storage"], 
            correct: "Iteration" 
        },
        { 
            q: "Which data type is most appropriate for a measurement like 1.75 meters?", 
            options: ["Integer", "Boolean", "Float", "String"], 
            correct: "Float" 
        },
        { 
            q: "What is the role of a 'Structure Chart' in software design?", 
            options: ["Styling the webpage", "Showing program modularity", "Storing data", "Debugging syntax errors"], 
            correct: "Showing program modularity" 
        },
        { 
            q: "Which of these is a professional version control platform?", 
            options: ["GitHub", "Sublime Text", "Chrome", "Windows"], 
            correct: "GitHub" 
        },
        { 
            q: "What is a 'Subprogram' primarily used for?", 
            options: ["Reusing code and modularity", "Making the text bold", "Connecting to the internet", "Increasing RAM"], 
            correct: "Reusing code and modularity" 
        },
        { 
            q: "What does CSS stand for?", 
            options: ["Computer System Styles", "Cascading Style Sheets", "Creative Software Solutions", "Central Styling Syntax"], 
            correct: "Cascading Style Sheets" 
        },
        { 
            q: "In GitHub, what is a 'Commit' message used for?", 
            options: ["Sending an email", "Describing a code change", "Deleting a project", "Creating a password"], 
            correct: "Describing a code change" 
        }
    ];

    /* Global State */
    let currentIdx = 0;
    let score = 0;

    /* 2. SUBPROGRAM: loadQuestion */
    function loadQuestion() {
        const currentData = quizData[currentIdx];
        document.getElementById('question-text').innerText = `Q${currentIdx + 1}: ${currentData.q}`;
        
        const optionsDiv = document.getElementById('options-container');
        optionsDiv.innerHTML = ""; // Clear UI

        // ITERATION: Loop through options to build buttons
        currentData.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.innerText = opt;
            btn.className = "option-btn";
            // PARAMETER PASSING: Sending the user's string choice to the handler
            btn.onclick = () => handleAnswer(opt);
            optionsDiv.appendChild(btn);
        });
    }

    /* 3. SUBPROGRAM: handleAnswer (Parameter Passing & Selection) */
    function handleAnswer(userChoice) {
        const correctAns = quizData[currentIdx].correct;
        const feedback = document.getElementById('feedback');

        // SELECTION: Check if answer is correct
        if (userChoice === correctAns) {
            score++;
            feedback.innerText = "Correct! ✨";
            feedback.style.color = "var(--success)";
        } else {
            feedback.innerText = "Incorrect. Answer: " + correctAns;
            feedback.style.color = "var(--error)";
        }

        document.getElementById('score').innerText = score;

        // SEQUENCE: Move to next step
        currentIdx++;
        
        // Disable buttons to prevent double-clicking
        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(b => b.disabled = true);

        setTimeout(() => {
            if (currentIdx < quizData.length) {
                loadQuestion();
                feedback.innerText = "";
            } else {
                showResults();
            }
        }, 1200);
    }

    /* 4. SUBPROGRAM: Results Screen */
    function showResults() {
        document.getElementById('quiz-ui').classList.add('hidden');
        document.getElementById('final-screen').classList.remove('hidden');
        document.getElementById('final-score').innerText = score;
        document.getElementById('total-qs').innerText = quizData.length;
    }

    // Initial Execution
    loadQuestion();
</script>

</body>
</html>
