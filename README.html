<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logic Master: Puzzle Trainer</title>
    <style>
        /* CSS3: Styling for an intuitive educational interface */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c3e50;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .app-container {
            background-color: #ecf0f1;
            color: #2c3e50;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 400px;
            text-align: center;
        }
        .stats-bar { display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: bold; }
        .question-box { background: #3498db; color: white; padding: 20px; border-radius: 8px; min-height: 80px; margin-bottom: 20px; }
        input { width: 80%; padding: 10px; border: 2px solid #bdc3c7; border-radius: 4px; font-size: 1.2rem; }
        button { margin-top: 15px; padding: 10px 25px; background: #27ae60; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
        button:hover { background: #2ecc71; }
        #feedback { margin-top: 15px; font-weight: bold; height: 20px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="stats-bar">
        <span>Score: <span id="score">0</span></span>
        <span>Level: <span id="level">Beginner</span></span>
    </div>

    <div class="question-box">
        <p id="question-text">Loading puzzle...</p>
    </div>

    <input type="number" id="user-input" placeholder="Enter answer">
    <br>
    <button onclick="handleSubmission()">Submit Answer</button>

    <div id="feedback"></div>
</div>

<script>
    /* 1. DATA STRUCTURE (The Store) */
    // An array of objects to store puzzle data
    const puzzleLibrary = [
        { q: "What is 15 + 27?", a: 42, difficulty: 1 },
        { q: "Find the next number: 2, 4, 8, 16, ?", a: 32, difficulty: 1 },
        { q: "A triangle has angles 90 and 45. What is the 3rd?", a: 45, difficulty: 2 },
        { q: "If x + 5 = 12, what is x?", a: 7, difficulty: 2 },
        { q: "What is 12 x 12?", a: 144, difficulty: 3 },
        { q: "Square root of 81?", a: 9, difficulty: 3 }
    ];

    /* Global Variables */
    let currentScore = 0;
    let currentIndex = 0;

    /* 2. SUBPROGRAM: Load Question */
    function loadQuestion() {
        document.getElementById('question-text').innerText = puzzleLibrary[currentIndex].q;
        document.getElementById('user-input').value = "";
        document.getElementById('feedback').innerText = "";
    }

    /* 3. SUBPROGRAM: verifyAnswer (Parameter Passing) */
    // Demonstrates COMPLEX LOGIC and SELECTION
    function verifyAnswer(userInput, correctAnswer) {
        if (parseFloat(userInput) === correctAnswer) {
            return true;
        } else {
            return false;
        }
    }

    /* 4. SUBPROGRAM: levelManager (Update Level based on Score) */
    function updateLevel(score) {
        let levelSpan = document.getElementById('level');
        if (score >= 50) {
            levelSpan.innerText = "Grandmaster";
            levelSpan.style.color = "#e67e22";
        } else if (score >= 30) {
            levelSpan.innerText = "Expert";
            levelSpan.style.color = "#9b59b6";
        } else if (score >= 10) {
            levelSpan.innerText = "Intermediate";
        }
    }

    /* 5. MAIN CONTROLLER */
    function handleSubmission() {
        let uInput = document.getElementById('user-input').value;
        let cAnswer = puzzleLibrary[currentIndex].a;

        // Call subprogram with parameters
        let isCorrect = verifyAnswer(uInput, cAnswer);

        if (isCorrect) {
            currentScore += 10;
            document.getElementById('feedback').innerText = "Correct! +10 Points";
            document.getElementById('feedback').style.color = "green";
        } else {
            document.getElementById('feedback').innerText = "Try again!";
            document.getElementById('feedback').style.color = "red";
        }

        // Update Score and Level
        document.getElementById('score').innerText = currentScore;
        updateLevel(currentScore);

        // Move to next puzzle (Iteration logic)
        currentIndex++;
        if (currentIndex >= puzzleLibrary.length) {
            currentIndex = 0; // Loop back to start
        }

        // Delay loading next question so user can see feedback
        setTimeout(loadQuestion, 1500);
    }

    // Initial load
    loadQuestion();
</script>

</body>
</html>
