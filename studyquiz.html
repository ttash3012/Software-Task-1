<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Software Engineering: Study Quiz Pro</title>
    <style>
        /* CSS3: Professional Educational Interface */
        :root {
            --primary: #3498db;
            --success: #27ae60;
            --error: #e74c3c;
            --bg: #f4f7f6;
            --text: #2c3e50;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg); 
            display: flex; 
            justify-content: center; 
            padding: 40px 20px;
            color: var(--text);
        }

        .quiz-container { 
            background: white; 
            width: 100%;
            max-width: 600px; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.1); 
        }

        .header-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .question-text { font-size: 1.3rem; margin-bottom: 20px; line-height: 1.4; }

        .option-btn { 
            display: block; 
            width: 100%; 
            padding: 15px; 
            margin: 12px 0; 
            background: #fff; 
            border: 2px solid #e0e0e0; 
            border-radius: 8px; 
            cursor: pointer; 
            text-align: left; 
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        .option-btn:hover { 
            border-color: var(--primary);
            background: #f0f7ff;
            transform: translateY(-2px);
        }

        .score-display { font-weight: bold; color: var(--primary); font-size: 1.1rem; }

        #feedback { 
            font-weight: bold; 
            margin-top: 20px; 
            text-align: center; 
            min-height: 24px;
        }

        .hidden { display: none; }

        .btn-restart {
            margin-top: 20px;
            padding: 12px 30px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="quiz-container">

        <div class="score-display">Score: <span id="score">0</span></div>
    </div>

    <div id="quiz-ui">
        <div class="question-text" id="question-text">Initializing quiz engine...</div>
        <div id="options-container"></div>
        <div id="feedback"></div>
    </div>
    
    <div id="final-screen" class="hidden" style="text-align: center;">
        <h2>Quiz Complete! 🎓</h2>
        <p style="font-size: 1.2rem;">Your final score: <span id="final-score">0</span> / <span id="total-qs">0</span></p>
        <button class="btn-restart" onclick="location.reload()">Restart Session</button>
    </div>
</div>
